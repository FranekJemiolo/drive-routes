name: Preview Deploy

on:
  pull_request:
    branches-ignore:
      - main
  push:
    branches-ignore:
      - main

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm run install:all

      - name: Build Web
        run: |
          cd apps/web
          npm run build
          npm run export

      - name: Deploy API (preview)
        uses: superfly/flyctl-actions@1.5
        with:
          args: "deploy --app drive-api-preview --remote-only"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy frontend preview
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/out
          destination_dir: preview/${{ github.head_ref }}
