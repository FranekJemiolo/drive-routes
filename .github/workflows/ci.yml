name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm run install:all
      
      - name: Typecheck frontend
        run: cd apps/web && npm run type-check

      - name: Run tests
        run: cd apps/web && npm test
      
      - name: Build web app
        run: |
          cd apps/web
          NEXT_PUBLIC_BASE_PATH=/drive-routes npm run build
