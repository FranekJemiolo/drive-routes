name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Seed demo database
        run: cd apps/api && npx tsx scripts/seed-demo-db.ts
      
      - name: Build web app
        run: cd apps/web && npm run build
        env:
          NEXT_PUBLIC_API_URL: 'https://franekjemiolo.github.io/drive-routes/api'
      
      - name: Copy demo database
        run: cp apps/api/demo.db apps/web/out/demo.db
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/out
