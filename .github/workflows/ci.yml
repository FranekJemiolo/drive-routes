name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Web
        run: cd apps/web && npm run build

  test-sqlite-demo:
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Seed demo database
        run: cd apps/api && npx tsx scripts/seed-demo-db.ts
      
      - name: Start API in demo mode
        run: cd apps/api && DEMO_MODE=true npm run dev &
        env:
          DEMO_MODE: "true"
      
      - name: Wait for API to start
        run: sleep 5
      
      - name: Test API health
        run: curl http://localhost:3001/
      
      - name: Test API mode
        run: |
          response=$(curl -s http://localhost:3001/)
          echo $response
          if [[ $response == *"sqlite"* ]]; then
            echo "✓ API running in SQLite demo mode"
          else
            echo "✗ API not in SQLite mode"
            exit 1
          fi
      
      - name: Test roads endpoint
        run: curl -s http://localhost:3001/roads | head -c 500

  deploy-github-pages:
    runs-on: ubuntu-latest
    needs: test-sqlite-demo
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Seed demo database
        run: cd apps/api && npx tsx scripts/seed-demo-db.ts
      
      - name: Build web app
        run: cd apps/web && npm run build
        env:
          NEXT_PUBLIC_API_URL: 'https://franekjemiolo.github.io/drive-routes/api'
      
      - name: Copy demo database
        run: cp apps/api/demo.db apps/web/out/demo.db
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/out
