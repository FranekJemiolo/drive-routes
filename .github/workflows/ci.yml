name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint API
        run: cd apps/api && npm run lint || true
      
      - name: Lint Web
        run: cd apps/web && npm run lint || true
      
      - name: Type check API
        run: cd apps/api && npx tsc --noEmit || true
      
      - name: Type check Web
        run: cd apps/web && npx tsc --noEmit || true
      
      - name: Build API
        run: cd apps/api && npm run build || true
      
      - name: Build Web
        run: cd apps/web && npm run build
