version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: drive-routes-db
    environment:
      POSTGRES_DB: drive_routes
      POSTGRES_USER: drive_routes
      POSTGRES_PASSWORD: drive_routes_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drive_routes -d drive_routes"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
